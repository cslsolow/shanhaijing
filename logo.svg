<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="far" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Parchment background -->
  <rect width="200" height="200" rx="10" fill="#f2ede2"/>

  <!-- Atmospheric haze -->
  <ellipse cx="100" cy="125" rx="90" ry="50" fill="#d4ccbc" opacity="0.4" filter="url(#mist)"/>

  <!-- Distant peaks — faint, blurred -->
  <polygon points="0,140 35,80 70,140"   fill="#9a9288" opacity="0.35" filter="url(#soft)"/>
  <polygon points="130,140 165,75 200,140" fill="#9a9288" opacity="0.35" filter="url(#soft)"/>

  <!-- Middle mountain -->
  <polygon points="15,142 65,72 115,142" fill="#5a5448" opacity="0.55" filter="url(#far)"/>

  <!-- First mist band -->
  <rect x="0" y="108" width="200" height="22" fill="#f2ede2" opacity="0.65" filter="url(#far)"/>

  <!-- Main foreground mountain — sharp, dark -->
  <polygon points="50,148 100,38 150,148" fill="#1e1a14"/>
  <polygon points="100,38 150,148 125,148" fill="#0e0b08" opacity="0.6"/>
  <!-- Snow cap -->
  <polygon points="94,52 100,38 106,52" fill="#d4ccbc" opacity="0.9"/>

  <!-- Second mist band over mountain base -->
  <rect x="0" y="132" width="200" height="18" fill="#f2ede2" opacity="0.5" filter="url(#far)"/>

  <!-- Water area -->
  <rect x="0" y="148" width="200" height="52" fill="#c8c0b0" opacity="0.4"/>

  <!-- Brush-stroke waves -->
  <path d="M10,157 Q30,153 50,157 Q70,161 90,157 Q110,153 130,157 Q150,161 165,157"
        fill="none" stroke="#6a6258" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <path d="M25,165 Q50,161 75,165 Q100,169 125,165 Q150,161 175,165"
        fill="none" stroke="#6a6258" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <path d="M5,173 Q35,169 65,173 Q95,177 125,173 Q155,169 190,173"
        fill="none" stroke="#6a6258" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>

  <!-- Reflection -->
  <polygon points="72,148 100,168 128,148" fill="#2a2218" opacity="0.12" filter="url(#soft)"/>

  <!-- Red seal — 经 -->
  <rect x="148" y="16" width="36" height="36" rx="2" fill="#bf2a1a"/>
  <rect x="150" y="18" width="32" height="32" rx="1" fill="none" stroke="#e8c8a0" stroke-width="0.8" opacity="0.6"/>
  <text x="166" y="43" font-family="'Noto Serif SC','Source Han Serif SC','STSong','SimSun',serif"
        font-size="22" fill="#f2ede2" text-anchor="middle">经</text>

  <!-- Inner border frame -->
  <rect x="8" y="8" width="184" height="184" rx="6" fill="none" stroke="#c8bfaa" stroke-width="0.8" opacity="0.7"/>
</svg>
